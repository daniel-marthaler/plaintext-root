<ui:composition xmlns:h="http://java.sun.com/jsf/html"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                template="/includes/template.xhtml">

    <ui:define name="content">
        <h:form id="fm">
            <input type="hidden" name="_csrf" value="#{_csrf.token}"/>
            <f:metadata>
                <f:event type="preRenderView" listener="#{wertelistenBackingBean.checkAccess()}"/>
            </f:metadata>

            <p:growl id="messages" showDetail="true" life="3000"/>

            <p:confirmDialog global="true" showEffect="fade" hideEffect="fade">
                <p:commandButton value="Ja" type="button" styleClass="ui-confirmdialog-yes"/>
                <p:commandButton value="Nein" type="button" styleClass="ui-confirmdialog-no"/>
            </p:confirmDialog>

            <p:fieldset legend="Wertelisten">

                <div style="margin-bottom: 10px;">
                    <p:commandButton value="Neue Werteliste" icon="pi pi-plus"
                                     actionListener="#{wertelistenBackingBean.newWerteliste()}"
                                     oncomplete="PF('dlg').show()"
                                     update="detailDialog" process="@this"/>

                    <p:commandButton value="Bearbeiten" icon="pi pi-pencil"
                                     actionListener="#{wertelistenBackingBean.select()}"
                                     oncomplete="PF('dlg').show()"
                                     update="detailDialog" process="@this"
                                     disabled="#{wertelistenBackingBean.selected == null}"
                                     style="margin-left: 5px;"/>

                    <p:commandButton value="Löschen" icon="pi pi-trash" styleClass="ui-button-danger"
                                     actionListener="#{wertelistenBackingBean.delete()}"
                                     update="messages,tbl" process="@this"
                                     disabled="#{wertelistenBackingBean.selected == null}"
                                     style="margin-left: 5px;">
                        <p:confirm header="Bestätigung"
                                   message="Werteliste '#{wertelistenBackingBean.selected.key}' wirklich löschen?"
                                   icon="pi pi-exclamation-triangle"/>
                    </p:commandButton>
                </div>

                <p:dataTable id="tbl" var="obj" value="#{wertelistenBackingBean.wertelisten}"
                             selectionMode="single" selection="#{wertelistenBackingBean.selected}"
                             rowKey="#{obj.key}#{obj.mandat}" emptyMessage="-">

                    <p:ajax event="rowSelect" listener="#{wertelistenBackingBean.select()}" update="fm"/>
                    <p:ajax event="rowUnselect" listener="#{wertelistenBackingBean.clearSelection()}" update="fm"/>

                    <p:column headerText="Schlüssel" sortBy="#{obj.key}">
                        <h:outputText value="#{obj.key}"/>
                    </p:column>

                    <p:column headerText="Mandat" sortBy="#{obj.mandat}">
                        <h:outputText value="#{obj.mandat}"/>
                    </p:column>

                    <p:column headerText="Anzahl Einträge">
                        <h:outputText value="#{obj.entries.size()}"/>
                    </p:column>

                    <p:column headerText="Letzte Änderung">
                        <h:outputText value="#{obj.lastModifiedDate}">
                            <f:convertDateTime type="localDateTime" pattern="dd.MM.yyyy HH:mm"/>
                        </h:outputText>
                    </p:column>
                </p:dataTable>

            </p:fieldset>

            <p:dialog header="Werteliste Details" widgetVar="dlg" modal="true"
                      showEffect="fade" hideEffect="fade" width="700" id="detailDialog">

                <h:panelGroup id="dialogContent" rendered="#{wertelistenBackingBean.selected != null}">
                    <h:panelGrid columns="2" style="width: 100%;" id="detailPanel">
                        <h:outputText value="Schlüssel:"/>
                        <p:inputText id="keyInput" value="#{wertelistenBackingBean.selected.key}" required="true"
                                     style="width: 300px;"/>

                        <h:outputText value="Mandat:"/>
                        <p:selectOneMenu id="mandatInput" value="#{wertelistenBackingBean.selected.mandat}"
                                         editable="#{wertelistenBackingBean.root}"
                                         disabled="#{!wertelistenBackingBean.root}"
                                         style="width: 300px;">
                            <f:selectItem itemLabel="-- Mandat wählen --" itemValue="" noSelectionOption="true"/>
                            <f:selectItems value="#{wertelistenBackingBean.allMandate}"
                                         var="m" itemLabel="#{m}" itemValue="#{m}"/>
                        </p:selectOneMenu>
                    </h:panelGrid>

                    <p:separator style="margin: 10px 0;"/>

                    <h:panelGrid columns="2" style="width: 100%; margin-bottom: 10px;" id="addPanel">
                        <p:inputText id="newValueInput" value="#{wertelistenBackingBean.newValue}"
                                     placeholder="Neuer Wert" style="width: 300px;"/>
                        <p:commandButton value="Hinzufügen" icon="pi pi-plus"
                                         actionListener="#{wertelistenBackingBean.addEntry()}"
                                         update="entriesList,addPanel" process="addPanel"/>
                    </h:panelGrid>

                    <p:dataTable id="entriesList" var="entry"
                                 value="#{wertelistenBackingBean.selected.entries}"
                                 emptyMessage="Keine Einträge">

                        <p:column headerText="Wert">
                            <h:outputText value="#{entry.value}"/>
                        </p:column>

                        <p:column headerText="Reihenfolge" style="width: 80px;">
                            <h:outputText value="#{entry.sortOrder}"/>
                        </p:column>

                        <p:column headerText="Aktionen" style="width: 150px;">
                            <p:commandButton icon="pi pi-arrow-up"
                                             actionListener="#{wertelistenBackingBean.moveUp(entry)}"
                                             update="entriesList" process="@this"
                                             style="margin-right: 5px;"/>
                            <p:commandButton icon="pi pi-arrow-down"
                                             actionListener="#{wertelistenBackingBean.moveDown(entry)}"
                                             update="entriesList" process="@this"
                                             style="margin-right: 5px;"/>
                            <p:commandButton icon="pi pi-trash" styleClass="ui-button-danger"
                                             actionListener="#{wertelistenBackingBean.removeEntry(entry)}"
                                             update="entriesList" process="@this"/>
                        </p:column>
                    </p:dataTable>

                    <p:separator style="margin: 10px 0;"/>

                    <p:commandButton value="Speichern" icon="pi pi-check"
                                     action="#{wertelistenBackingBean.save()}"
                                     update="messages,fm:tbl"
                                     process="detailDialog"
                                     oncomplete="if (args &amp;&amp; !args.validationFailed) PF('dlg').hide()"/>
                </h:panelGroup>
            </p:dialog>

        </h:form>
    </ui:define>
</ui:composition>
