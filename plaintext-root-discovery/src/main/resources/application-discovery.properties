# Discovery Multi-Instance Navigation Configuration
# ================================================

# Enable/disable discovery feature
discovery.enabled=true

# MQTT Configuration
# Leave empty to run without MQTT (only own instance visible)
# Set to a MQTT broker URL to enable cross-app discovery
discovery.mqtt.broker=${DISCOVERY_MQTT_BROKER:}
discovery.mqtt.client-id=plaintext-discovery
discovery.mqtt.connection-timeout-seconds=10
discovery.mqtt.keep-alive-interval-seconds=60

# App Configuration
discovery.app.id=${spring.application.name:plaintext}
discovery.app.name=${PLAINTEXT_APP_NAME:Plaintext App}
discovery.app.environment=${plaintext.stage:dev}
discovery.app.version=${project.version:unknown}
discovery.app.url=${PLAINTEXT_APP_URL:http://localhost:${server.port:8080}}

# Heartbeat Configuration
discovery.heartbeat.enabled=true
discovery.heartbeat.interval-ms=120000
discovery.heartbeat.cleanup-interval-ms=600000
discovery.heartbeat.session-timeout-hours=6

# Token Configuration
discovery.token.validity-seconds=300
discovery.token.encryption-enabled=true
