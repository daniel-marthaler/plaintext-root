<ui:composition xmlns:h="http://java.sun.com/jsf/html"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                template="/includes/template.xhtml">

    <ui:define name="content">
        <h:form id="fm" enctype="multipart/form-data">
            <input type="hidden" name="_csrf" value="#{_csrf.token}"/>
            <f:metadata>
                <f:event type="preRenderView" listener="#{filelistBackingBean.checkAccess()}"/>
            </f:metadata>

            <p:growl id="messages" showDetail="true" life="3000"/>

            <p:confirmDialog global="true" showEffect="fade" hideEffect="fade">
                <p:commandButton value="Ja" type="button" styleClass="ui-confirmdialog-yes"/>
                <p:commandButton value="Nein" type="button" styleClass="ui-confirmdialog-no"/>
            </p:confirmDialog>

            <p:fieldset legend="#{i18n.t('Dateiliste')}">

                <div style="margin-bottom: 10px;">
                    <h:outputText value="#{i18n.t('Gesamtspeicher')}: " style="font-weight: bold; margin-right: 10px;"/>
                    <h:outputText value="#{filelistBackingBean.totalStorageUsedFormatted}" style="font-weight: bold; color: #007bff;"/>
                </div>

                <div style="margin-bottom: 10px;">
                    <p:commandButton value="#{i18n.t('Hochladen')}" icon="pi pi-upload"
                                     oncomplete="PF('uploadDlg').show()"
                                     update="uploadPanel" process="@this"/>

                    <p:commandButton value="#{i18n.t('Herunterladen')}" icon="pi pi-download"
                                     actionListener="#{filelistBackingBean.download()}"
                                     disabled="#{filelistBackingBean.selected == null}"
                                     style="margin-left: 5px;" ajax="false"/>

                    <p:commandButton value="#{i18n.t('Metadaten bearbeiten')}" icon="pi pi-pencil"
                                     actionListener="#{filelistBackingBean.select()}"
                                     oncomplete="PF('metadataDlg').show()"
                                     update="metadataDialog" process="@this"
                                     disabled="#{filelistBackingBean.selected == null}"
                                     style="margin-left: 5px;"/>

                    <p:commandButton value="#{i18n.t('Löschen')}" icon="pi pi-trash" styleClass="ui-button-danger"
                                     actionListener="#{filelistBackingBean.delete()}"
                                     update="messages,tbl" process="@this"
                                     disabled="#{filelistBackingBean.selected == null}"
                                     style="margin-left: 5px;">
                        <p:confirm header="Bestätigung"
                                   message="Datei '#{filelistBackingBean.selected.filename}' wirklich löschen?"
                                   icon="pi pi-exclamation-triangle"/>
                    </p:commandButton>
                </div>

                <p:dataTable id="tbl" var="obj" value="#{filelistBackingBean.files}"
                             selectionMode="single" selection="#{filelistBackingBean.selected}"
                             rowKey="#{obj.id}" emptyMessage="-" paginator="true" rows="20">

                    <p:ajax event="rowSelect" listener="#{filelistBackingBean.select()}" update="fm"/>
                    <p:ajax event="rowUnselect" listener="#{filelistBackingBean.clearSelection()}" update="fm"/>

                    <p:column headerText="#{i18n.t('Dateiname')}" sortBy="#{obj.filename}">
                        <h:outputText value="#{obj.filename}"/>
                    </p:column>

                    <p:column headerText="#{i18n.t('Kategorie')}" sortBy="#{obj.category}">
                        <h:outputText value="#{obj.category}"/>
                    </p:column>

                    <p:column headerText="#{i18n.t('Größe')}" sortBy="#{obj.fileSize}">
                        <h:outputText value="#{obj.fileSizeFormatted}"/>
                    </p:column>

                    <p:column headerText="Storage" sortBy="#{obj.storageBackend}">
                        <h:outputText value="#{obj.storageBackend}"/>
                    </p:column>

                    <p:column headerText="#{i18n.t('Hochgeladen von')}" sortBy="#{obj.uploadedBy}">
                        <h:outputText value="#{obj.uploadedBy}"/>
                    </p:column>

                    <p:column headerText="#{i18n.t('Zugriffe')}" sortBy="#{obj.accessCount}" style="width: 80px;">
                        <h:outputText value="#{obj.accessCount}"/>
                    </p:column>

                    <p:column headerText="#{i18n.t('Hochgeladen am')}" sortBy="#{obj.createdDate}">
                        <h:outputText value="#{obj.createdDate}">
                            <f:convertDateTime type="localDateTime" pattern="dd.MM.yyyy HH:mm"/>
                        </h:outputText>
                    </p:column>
                </p:dataTable>

            </p:fieldset>

            <p:dialog header="#{i18n.t('Datei hochladen')}" widgetVar="uploadDlg" modal="true"
                      showEffect="fade" hideEffect="fade" width="600">

                <h:panelGrid columns="2" style="width: 100%;" id="uploadPanel">
                    <h:outputText value="Datei:"/>
                    <p:fileUpload value="#{filelistBackingBean.uploadedFile}" mode="simple"
                                  skinSimple="true"/>

                    <h:outputText value="Kategorie:"/>
                    <p:selectOneMenu value="#{filelistBackingBean.uploadCategory}" editable="true" style="width: 400px;">
                        <f:selectItem itemLabel="-- Kategorie wählen --" itemValue=""/>
                        <f:selectItems value="#{filelistBackingBean.allCategories}"/>
                    </p:selectOneMenu>

                    <h:outputText value="Storage Backend:"/>
                    <p:selectOneMenu value="#{filelistBackingBean.uploadStorageBackend}" style="width: 400px;">
                        <f:selectItems value="#{filelistBackingBean.availableStorageBackends}"/>
                    </p:selectOneMenu>
                </h:panelGrid>

                <p:separator style="margin: 10px 0;"/>

                <p:commandButton value="Hochladen" icon="pi pi-upload"
                                 action="#{filelistBackingBean.upload()}"
                                 update="messages,tbl"
                                 process="uploadPanel"
                                 oncomplete="if (args &amp;&amp; !args.validationFailed) PF('uploadDlg').hide()"/>
            </p:dialog>

            <p:dialog header="#{i18n.t('Metadaten bearbeiten')}" widgetVar="metadataDlg" modal="true"
                      showEffect="fade" hideEffect="fade" width="700" id="metadataDialog">

                <h:panelGroup id="metadataContent" rendered="#{filelistBackingBean.selected != null}">
                    <h:panelGrid columns="2" style="width: 100%;" id="metadataPanel">
                        <h:outputText value="Dateiname:"/>
                        <p:inputText value="#{filelistBackingBean.selected.filename}" style="width: 500px;"/>

                        <h:outputText value="Kategorie:"/>
                        <p:selectOneMenu value="#{filelistBackingBean.selected.category}" editable="true" style="width: 500px;">
                            <f:selectItem itemLabel="-- Kategorie wählen --" itemValue=""/>
                            <f:selectItems value="#{filelistBackingBean.allCategories}"/>
                        </p:selectOneMenu>

                        <h:outputText value="Tags:"/>
                        <p:inputText value="#{filelistBackingBean.selected.tags}" style="width: 500px;"/>

                        <h:outputText value="Beschreibung:"/>
                        <p:inputTextarea value="#{filelistBackingBean.selected.beschreibung}" rows="4"
                                         style="width: 500px;"/>
                    </h:panelGrid>

                    <p:separator style="margin: 10px 0;"/>

                    <p:commandButton value="Speichern" icon="pi pi-check"
                                     action="#{filelistBackingBean.updateMetadata()}"
                                     update="messages,fm:tbl"
                                     process="metadataDialog"
                                     oncomplete="if (args &amp;&amp; !args.validationFailed) PF('metadataDlg').hide()"/>
                </h:panelGroup>
            </p:dialog>

        </h:form>
    </ui:define>
</ui:composition>
