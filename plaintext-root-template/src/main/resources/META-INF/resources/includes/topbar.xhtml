<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:p="http://primefaces.org/ui">

    <header class="layout-topbar">
        <nav class="layout-topbar-wrapper" role="navigation">

            <div class="layout-topbar-left">
                <ui:fragment rendered="#{brandingBean.hasAnyLogo()}">
                    <a href="#{request.contextPath}/index.html" class="topbar-logo" style="display:flex; align-items:center; margin-right:10px;">
                        <img id="branding-logo"
                             src="#{request.contextPath}/api/branding/logo?theme=#{userPreferencesBackingBean.darkMode}"
                             width="#{userPreferencesBackingBean.darkMode == 'dark' ? brandingBean.darkLogoWidth : brandingBean.lightLogoWidth}"
                             height="#{userPreferencesBackingBean.darkMode == 'dark' ? brandingBean.darkLogoHeight : brandingBean.lightLogoHeight}"
                             alt="Logo" style="object-fit:contain;"/>
                    </a>
                </ui:fragment>
                <a href="#" class="menu-button" aria-label="Menu">
                    <i class="pi pi-bars"/>
                </a>
            </div>

            <ui:include src="/menu.xhtml"/>

            <div class="layout-topbar-right">
                <ul class="layout-topbar-actions">

                    <ui:fragment rendered="#{discoveryTopbarBackingBean.hasRemoteApps()}">
                        <li class="topbar-item" style="position: relative;">
                            <a href="#" id="discovery-apps-button" title="Verbundene Apps"
                               aria-haspopup="true" aria-expanded="false">
                                <i class="topbar-icon pi pi-globe" style="font-size: 1.5rem"/>
                            </a>
                            <ul id="discovery-apps-dropdown" class="topbar-dropdown" role="menu"
                                style="display:none; position:absolute; right:0; top:100%; min-width:200px;
                                       background:var(--surface-card, #ffffff); border-radius:6px;
                                       box-shadow:0 2px 12px rgba(0,0,0,0.1); z-index:1000;
                                       list-style:none; padding:0.5rem 0; margin:0;">
                                <ui:repeat value="#{discoveryTopbarBackingBean.remoteApps}" var="app">
                                    <li role="menuitem">
                                        <a href="#{discoveryTopbarBackingBean.getLoginUrl(app)}" target="_blank"
                                           class="topbar-dropdown-item">
                                            <i class="pi pi-globe"/>
                                            <span>#{app.appName}</span>
                                            <small>#{app.environment}</small>
                                        </a>
                                    </li>
                                </ui:repeat>
                                <ui:fragment rendered="#{p:ifGranted('ROLE_ROOT')}">
                                    <li class="topbar-dropdown-divider"/>
                                    <li role="menuitem">
                                        <a href="discoveryStats.xhtml" class="topbar-dropdown-item">
                                            <i class="pi pi-chart-line"/>
                                            <span>Discovery Stats</span>
                                        </a>
                                    </li>
                                </ui:fragment>
                            </ul>
                            <script>
                                (function() {
                                    var btn = document.getElementById('discovery-apps-button');
                                    var dd = document.getElementById('discovery-apps-dropdown');
                                    if (!btn || !dd) return;
                                    btn.addEventListener('click', function(e) {
                                        e.preventDefault(); e.stopPropagation();
                                        dd.style.display = dd.style.display === 'none' ? 'block' : 'none';
                                    });
                                    document.addEventListener('click', function(e) {
                                        if (!btn.contains(e.target) &amp;&amp; !dd.contains(e.target)) dd.style.display = 'none';
                                    });
                                })();
                            </script>
                        </li>
                    </ui:fragment>

                    <ui:fragment rendered="#{plaintextSecurity.impersonating}">
                        <li class="topbar-item">
                            <h:form id="impersonationFm" style="margin:0; padding:0; display:inline;">
                                <p:commandLink actionListener="#{myUserBackingBean.stopImpersonation()}"
                                               update="@none" process="@this"
                                               title="Impersonation beenden"
                                               style="text-decoration:none;">
                                    <i class="topbar-icon pi pi-circle-fill" style="font-size:1.5rem"/>
                                </p:commandLink>
                                <input type="hidden" name="_csrf" value="#{_csrf.token}"/>
                            </h:form>
                        </li>
                    </ui:fragment>

                    <ui:fragment rendered="#{p:ifGranted('ROLE_ROOT')}">
                        <li class="topbar-item">
                            <a href="javascript:PF('mandantBeml').show()" title="Mein Mandat Wechseln">
                                <i class="topbar-icon pi pi-prime" style="font-size:1.5rem"/>
                            </a>
                        </li>
                    </ui:fragment>

                    <ui:fragment rendered="#{p:ifGranted('ROLE_ADMIN') or p:ifGranted('ROLE_ROOT')}">
                        <li class="topbar-item">
                            <a href="useradmin.xhtml" title="Benutzer verwalten">
                                <i class="topbar-icon pi pi-users" style="font-size:1.5rem"/>
                            </a>
                        </li>
                    </ui:fragment>

                    <ui:fragment rendered="#{i18nService != null and i18nService.i18nEnabled}">
                        <li class="topbar-item" style="position: relative;">
                            <a href="#" id="i18n-lang-button" title="Sprache wechseln"
                               aria-haspopup="true" aria-expanded="false">
                                <i class="topbar-icon #{brandingBean.i18nIcon}" style="font-size: 1.5rem; color: var(--primary-color);"/>
                            </a>
                            <ul id="i18n-lang-dropdown" class="topbar-dropdown" role="menu"
                                style="display:none; position:absolute; right:0; top:100%; min-width:150px;
                                       background:var(--surface-card, #ffffff); border-radius:6px;
                                       box-shadow:0 2px 12px rgba(0,0,0,0.1); z-index:1000;
                                       list-style:none; padding:0.5rem 0; margin:0;">
                                <h:form id="i18nLangFm" style="margin:0; padding:0;">
                                    <ui:repeat value="#{i18nService.availableLanguages}" var="lang">
                                        <li role="menuitem">
                                            <p:commandLink styleClass="topbar-dropdown-item"
                                                           actionListener="#{userPreferencesBackingBean.setLanguage(lang)}"
                                                           update="@none" process="@this"
                                                           oncomplete="window.location.reload();">
                                                <i class="pi pi-flag"/>
                                                <span style="text-transform: uppercase;">#{lang}</span>
                                            </p:commandLink>
                                        </li>
                                    </ui:repeat>
                                    <input type="hidden" name="_csrf" value="#{_csrf.token}"/>
                                </h:form>
                            </ul>
                            <script>
                                (function() {
                                    var btn = document.getElementById('i18n-lang-button');
                                    var dd = document.getElementById('i18n-lang-dropdown');
                                    if (!btn || !dd) return;
                                    btn.addEventListener('click', function(e) {
                                        e.preventDefault(); e.stopPropagation();
                                        dd.style.display = dd.style.display === 'none' ? 'block' : 'none';
                                    });
                                    document.addEventListener('click', function(e) {
                                        if (!btn.contains(e.target) &amp;&amp; !dd.contains(e.target)) dd.style.display = 'none';
                                    });
                                })();
                            </script>
                        </li>
                    </ui:fragment>

                    <li class="topbar-item">
                        <a href="#" id="layout-config-button" title="Einstellungen">
                            <i class="topbar-icon pi pi-cog" style="font-size:1.5rem"/>
                        </a>
                    </li>

                    <!-- Chat Direct Messages Notification with Auto-Polling -->
                    <li class="topbar-item" style="display:inline;">
                        <h:form id="notificationPollingForm" style="display:inline; margin:0; padding:0;">
                            <p:poll interval="15" update="chatNotificationPanel"/>
                            <h:panelGroup id="chatNotificationPanel">
                                <ui:fragment rendered="#{directMessageNotificationBackingBean.hasUnreadMessages()}">
                                    <a href="chats.html"
                                       title="#{directMessageNotificationBackingBean.unreadMessageCount} ungelesene Nachricht(en)">
                                        <i class="topbar-icon pi pi-comments" style="font-size:1.5rem; color:#dc3545;"/>
                                        <span class="topbar-badge">#{directMessageNotificationBackingBean.unreadMessageCount}</span>
                                    </a>
                                </ui:fragment>
                            </h:panelGroup>
                            <input type="hidden" name="_csrf" value="#{_csrf.token}"/>
                        </h:form>
                    </li>

                    <li class="topbar-item" style="position:relative;">
                        <a href="#" id="user-menu-button" aria-haspopup="true" aria-expanded="false"
                           style="display:flex; align-items:center; justify-content:center;">
                            <i class="topbar-icon pi pi-user" style="font-size:1.5rem"/>
                        </a>
                        <ul id="user-menu-dropdown" class="topbar-dropdown" role="menu"
                            style="display:none; position:absolute; left:0; top:100%; min-width:180px;
                                   background:var(--surface-card, #ffffff); border-radius:6px;
                                   box-shadow:0 2px 12px rgba(0,0,0,0.1); z-index:1000;
                                   list-style:none; padding:0.5rem 0; margin:0;">
                            <li role="menuitem">
                                <a href="myuser.xhtml" class="topbar-dropdown-item">
                                    <i class="pi pi-user"/>
                                    <span>Mein Profil</span>
                                </a>
                            </li>
                            <li role="menuitem">
                                <a href="api-token.xhtml" class="topbar-dropdown-item">
                                    <i class="pi pi-key"/>
                                    <span>API Token</span>
                                </a>
                            </li>
                        </ul>
                        <script>
                            (function() {
                                var btn = document.getElementById('user-menu-button');
                                var dd = document.getElementById('user-menu-dropdown');
                                if (!btn || !dd) return;
                                btn.addEventListener('click', function(e) {
                                    e.preventDefault(); e.stopPropagation();
                                    var hidden = dd.style.display === 'none';
                                    dd.style.display = hidden ? 'block' : 'none';
                                    if (hidden) {
                                        dd.style.left = '0'; dd.style.right = 'auto';
                                        var r = dd.getBoundingClientRect();
                                        if (r.right > window.innerWidth) dd.style.left = (-(r.right - window.innerWidth + 8)) + 'px';
                                    }
                                });
                                document.addEventListener('click', function(e) {
                                    if (!btn.contains(e.target) &amp;&amp; !dd.contains(e.target)) dd.style.display = 'none';
                                });
                            })();
                        </script>
                    </li>

                    <li class="topbar-item">
                        <a href="#" title="Abmelden" id="logoutLink"
                           style="display:flex; align-items:center; justify-content:center; padding:8px; cursor:pointer;">
                            <i class="topbar-icon pi pi-sign-out" style="font-size:1.5rem"/>
                        </a>
                    </li>

                </ul>

            <!-- Logout form outside topbar to avoid PrimeFaces interference -->
            <form id="logoutForm" method="post" action="#{request.contextPath}/logout" style="display:none;">
                <input type="hidden" name="_csrf" value="#{_csrf.token}"/>
            </form>
            <script>
                document.getElementById('logoutLink').addEventListener('click', function(e) {
                    e.preventDefault();
                    var form = document.getElementById('logoutForm');
                    var xhr = new XMLHttpRequest();
                    xhr.open('POST', form.action, true);
                    xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
                    xhr.onreadystatechange = function() {
                        if (xhr.readyState === 4) {
                            window.location.href = xhr.responseURL || (form.action.replace('/logout', '/login.html'));
                        }
                    };
                    var csrf = form.querySelector('input[name="_csrf"]');
                    xhr.send('_csrf=' + encodeURIComponent(csrf.value));
                });
            </script>

                <p:dialog header="Mandat einstellen" widgetVar="mandantBeml" id="mandantBeml"
                          resizable="true" modal="false">
                    <h:form id="mandatFm">
                        <h:panelGrid columns="1" cellpadding="3">
                            <p:selectOneMenu value="#{plaintextSecurity.mandat}" style="width:200px;">
                                <f:selectItems value="#{plaintextSecurity.getAllMandate()}"
                                               var="dt" itemLabel="#{dt}" itemValue="#{dt}"/>
                                <p:ajax event="change" listener="#{myUserBackingBean.init()}"
                                        update="@none" process="@this"
                                        oncomplete="PF('mandantBeml').hide(); window.location.reload();"
                                        rendered="#{p:ifGranted('ROLE_ROOT')}"/>
                            </p:selectOneMenu>
                            <input type="hidden" name="_csrf" value="#{_csrf.token}"
                                   rendered="#{p:ifGranted('ROLE_ROOT')}"/>
                        </h:panelGrid>
                    </h:form>
                </p:dialog>

            </div>
        </nav>
    </header>

    <style>
        .topbar-dropdown {
            background-color: var(--surface-card, #ffffff) !important;
            border: 1px solid var(--surface-border);
        }
        .topbar-dropdown-item {
            display: flex; align-items: center; padding: 0.75rem 1rem;
            color: var(--text-color); text-decoration: none; gap: 0.75rem;
            transition: background-color 0.2s;
        }
        .topbar-dropdown-item:hover { background-color: var(--surface-hover); }
        .topbar-dropdown-item small {
            font-size: 0.7rem; opacity: 0.6; text-transform: uppercase; margin-left: auto;
        }
        .topbar-dropdown-divider {
            border-top: 1px solid var(--surface-border); margin: 0.25rem 0;
        }
        .topbar-badge {
            position: absolute; top: 8px; right: 8px;
            background-color: #dc3545; color: white; border-radius: 50%;
            width: 18px; height: 18px; font-size: 0.7rem;
            display: flex; align-items: center; justify-content: center; font-weight: bold;
        }
    </style>

</ui:composition>
