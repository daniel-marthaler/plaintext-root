<ui:composition xmlns:h="http://java.sun.com/jsf/html"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                template="/includes/template.xhtml">

    <ui:define name="content">
        <h:form id="fm" enctype="multipart/form-data">
            <input type="hidden" name="_csrf" value="#{_csrf.token}"/>
            <f:metadata>
                <f:event type="preRenderView" listener="#{brandingBackingBean.checkAccess()}"/>
            </f:metadata>

            <p:growl id="messages" showDetail="true" life="3000"/>

            <!-- Logo Light -->
            <p:fieldset legend="Logo (Light Mode)" toggleable="true" style="margin-bottom: 1rem;">
                <div class="grid">
                    <div class="col-12 md:col-6">
                        <h:panelGrid columns="2" cellpadding="5" style="width:100%;">
                            <h:outputText value="Breite (px):" style="font-weight:bold;"/>
                            <p:inputNumber id="lightWidth" value="#{brandingBackingBean.lightLogoWidth}"
                                           minValue="20" maxValue="500" decimalPlaces="0" style="width:120px;"/>

                            <h:outputText value="Höhe (px):" style="font-weight:bold;"/>
                            <p:inputNumber id="lightHeight" value="#{brandingBackingBean.lightLogoHeight}"
                                           minValue="10" maxValue="200" decimalPlaces="0" style="width:120px;"/>
                        </h:panelGrid>

                        <div style="margin-top:10px;">
                            <p:fileUpload listener="#{brandingBackingBean.handleLightLogoUpload}"
                                          mode="advanced" auto="true" allowTypes="/(\.|\/)(png|svg|webp|jpe?g)$/i"
                                          sizeLimit="2097152" fileLimit="1"
                                          update="messages lightPreviewPanel"
                                          label="Light-Logo hochladen" uploadLabel="Upload"
                                          cancelLabel="Abbrechen"
                                          style="margin-bottom:10px;"/>
                        </div>

                        <h:panelGroup rendered="#{brandingBackingBean.hasLightLogo}">
                            <p:commandButton value="Dimensionen speichern" icon="pi pi-save"
                                             actionListener="#{brandingBackingBean.saveLightLogoDimensions()}"
                                             update="messages" process="lightWidth lightHeight @this"
                                             style="margin-right:5px;"/>
                            <p:commandButton value="Logo entfernen" icon="pi pi-trash"
                                             styleClass="ui-button-danger"
                                             actionListener="#{brandingBackingBean.deleteLightLogo()}"
                                             update="messages fm"
                                             process="@this">
                                <p:confirm header="Bestätigung" message="Light-Logo wirklich löschen?"
                                           icon="pi pi-exclamation-triangle"/>
                            </p:commandButton>
                        </h:panelGroup>
                    </div>

                    <div class="col-12 md:col-6">
                        <h:panelGroup id="lightPreviewPanel">
                            <h:panelGroup rendered="#{brandingBackingBean.hasLightLogo}">
                                <p style="font-weight:bold; margin-bottom:5px;">Vorschau:</p>
                                <div style="background:#f8f9fa; padding:15px; border-radius:8px; display:inline-block;">
                                    <img src="#{brandingBackingBean.lightLogoPreview}"
                                         width="#{brandingBackingBean.lightLogoWidth}"
                                         height="#{brandingBackingBean.lightLogoHeight}"
                                         alt="Light Logo Preview"
                                         style="max-width:100%; object-fit:contain;"/>
                                </div>
                            </h:panelGroup>
                            <h:panelGroup rendered="#{!brandingBackingBean.hasLightLogo}">
                                <p style="color:var(--text-color-secondary); font-style:italic;">
                                    Kein Light-Logo hochgeladen
                                </p>
                            </h:panelGroup>
                        </h:panelGroup>
                    </div>
                </div>
            </p:fieldset>

            <!-- Logo Dark -->
            <p:fieldset legend="Logo (Dark Mode)" toggleable="true" style="margin-bottom: 1rem;">
                <div class="grid">
                    <div class="col-12 md:col-6">
                        <h:panelGrid columns="2" cellpadding="5" style="width:100%;">
                            <h:outputText value="Breite (px):" style="font-weight:bold;"/>
                            <p:inputNumber id="darkWidth" value="#{brandingBackingBean.darkLogoWidth}"
                                           minValue="20" maxValue="500" decimalPlaces="0" style="width:120px;"/>

                            <h:outputText value="Höhe (px):" style="font-weight:bold;"/>
                            <p:inputNumber id="darkHeight" value="#{brandingBackingBean.darkLogoHeight}"
                                           minValue="10" maxValue="200" decimalPlaces="0" style="width:120px;"/>
                        </h:panelGrid>

                        <div style="margin-top:10px;">
                            <p:fileUpload listener="#{brandingBackingBean.handleDarkLogoUpload}"
                                          mode="advanced" auto="true" allowTypes="/(\.|\/)(png|svg|webp|jpe?g)$/i"
                                          sizeLimit="2097152" fileLimit="1"
                                          update="messages darkPreviewPanel"
                                          label="Dark-Logo hochladen" uploadLabel="Upload"
                                          cancelLabel="Abbrechen"
                                          style="margin-bottom:10px;"/>
                        </div>

                        <h:panelGroup rendered="#{brandingBackingBean.hasDarkLogo}">
                            <p:commandButton value="Dimensionen speichern" icon="pi pi-save"
                                             actionListener="#{brandingBackingBean.saveDarkLogoDimensions()}"
                                             update="messages" process="darkWidth darkHeight @this"
                                             style="margin-right:5px;"/>
                            <p:commandButton value="Logo entfernen" icon="pi pi-trash"
                                             styleClass="ui-button-danger"
                                             actionListener="#{brandingBackingBean.deleteDarkLogo()}"
                                             update="messages fm"
                                             process="@this">
                                <p:confirm header="Bestätigung" message="Dark-Logo wirklich löschen?"
                                           icon="pi pi-exclamation-triangle"/>
                            </p:commandButton>
                        </h:panelGroup>
                    </div>

                    <div class="col-12 md:col-6">
                        <h:panelGroup id="darkPreviewPanel">
                            <h:panelGroup rendered="#{brandingBackingBean.hasDarkLogo}">
                                <p style="font-weight:bold; margin-bottom:5px;">Vorschau:</p>
                                <div style="background:#1e1e2f; padding:15px; border-radius:8px; display:inline-block;">
                                    <img src="#{brandingBackingBean.darkLogoPreview}"
                                         width="#{brandingBackingBean.darkLogoWidth}"
                                         height="#{brandingBackingBean.darkLogoHeight}"
                                         alt="Dark Logo Preview"
                                         style="max-width:100%; object-fit:contain;"/>
                                </div>
                            </h:panelGroup>
                            <h:panelGroup rendered="#{!brandingBackingBean.hasDarkLogo}">
                                <p style="color:var(--text-color-secondary); font-style:italic;">
                                    Kein Dark-Logo hochgeladen
                                </p>
                            </h:panelGroup>
                        </h:panelGroup>
                    </div>
                </div>
            </p:fieldset>

            <!-- Footer Settings -->
            <p:fieldset legend="Footer" toggleable="true" style="margin-bottom: 1rem;">
                <div class="grid">
                    <div class="col-12 md:col-8">
                        <h:panelGrid columns="2" cellpadding="5" style="width:100%;">
                            <h:outputText value="Footer-Text:" style="font-weight:bold;"/>
                            <p:inputText id="footerText" value="#{brandingBackingBean.footerText}"
                                         placeholder="z.B. Copyright © Meine Firma"
                                         style="width:100%;"/>

                            <h:outputText value="Version anzeigen:" style="font-weight:bold;"/>
                            <p:toggleSwitch id="showVersion" value="#{brandingBackingBean.showVersion}"/>

                            <h:outputText value="Root-Version anzeigen:" style="font-weight:bold;"/>
                            <p:toggleSwitch id="showRootVersion" value="#{brandingBackingBean.showRootVersion}"/>
                        </h:panelGrid>

                        <p:commandButton value="Footer speichern" icon="pi pi-save"
                                         actionListener="#{brandingBackingBean.saveFooterSettings()}"
                                         update="messages"
                                         process="footerText showVersion showRootVersion @this"
                                         style="margin-top:10px;"/>
                    </div>

                    <div class="col-12 md:col-4">
                        <p style="font-weight:bold; margin-bottom:5px;">Vorschau:</p>
                        <div style="background:var(--surface-50); padding:10px; border-radius:8px; font-size:0.8rem; color:var(--text-color-secondary);">
                            <h:outputText value="#{brandingBackingBean.footerText}"
                                          rendered="#{not empty brandingBackingBean.footerText}"/>
                            <h:outputText value="Copyright &#169; Plaintext.ch"
                                          rendered="#{empty brandingBackingBean.footerText}"/>
                            <h:outputText value=" | Version #{versionBean.version}"
                                          rendered="#{brandingBackingBean.showVersion}"/>
                            <h:outputText value=" | Root #{versionBean.rootVersion}"
                                          rendered="#{brandingBackingBean.showRootVersion}"/>
                        </div>
                    </div>
                </div>
            </p:fieldset>

            <p:confirmDialog global="true" showEffect="fade" hideEffect="fade">
                <p:commandButton value="Ja" type="button" styleClass="ui-confirmdialog-yes"/>
                <p:commandButton value="Nein" type="button" styleClass="ui-confirmdialog-no"/>
            </p:confirmDialog>
        </h:form>
    </ui:define>
</ui:composition>
