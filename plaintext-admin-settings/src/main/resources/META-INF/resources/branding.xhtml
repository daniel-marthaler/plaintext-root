<ui:composition xmlns:h="http://java.sun.com/jsf/html"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                template="/includes/template.xhtml">

    <ui:define name="content">
        <h:form id="fm" enctype="multipart/form-data">
            <input type="hidden" name="_csrf" value="#{_csrf.token}"/>
            <f:metadata>
                <f:event type="preRenderView" listener="#{brandingBackingBean.checkAccess()}"/>
            </f:metadata>

            <p:growl id="messages" showDetail="true" life="3000"/>

            <!-- Logo Light -->
            <p:fieldset legend="#{i18n.t('Logo (Light Mode)')}" toggleable="true" style="margin-bottom: 1rem;">
                <div class="grid">
                    <div class="col-12 md:col-6">
                        <h:panelGrid columns="2" cellpadding="5" style="width:100%;">
                            <h:outputText value="#{i18n.t('Breite')} (px):" style="font-weight:bold;"/>
                            <p:inputNumber id="lightWidth" value="#{brandingBackingBean.lightLogoWidth}"
                                           minValue="20" maxValue="500" decimalPlaces="0" style="width:120px;"/>

                            <h:outputText value="#{i18n.t('Höhe')} (px):" style="font-weight:bold;"/>
                            <p:inputNumber id="lightHeight" value="#{brandingBackingBean.lightLogoHeight}"
                                           minValue="10" maxValue="200" decimalPlaces="0" style="width:120px;"/>
                        </h:panelGrid>

                        <div style="margin-top:10px;">
                            <p:fileUpload listener="#{brandingBackingBean.handleLightLogoUpload}"
                                          mode="advanced" auto="true" allowTypes="/(\.|\/)(png|svg|webp|jpe?g)$/i"
                                          maxFileSize="2097152" fileLimit="1"
                                          update="messages lightPreviewPanel"
                                          label="Light-Logo hochladen" uploadLabel="Upload"
                                          cancelLabel="Abbrechen"
                                          style="margin-bottom:10px;"/>
                        </div>

                        <h:panelGroup rendered="#{brandingBackingBean.hasLightLogo}">
                            <p:commandButton value="#{i18n.t('Dimensionen speichern')}" icon="pi pi-save"
                                             actionListener="#{brandingBackingBean.saveLightLogoDimensions()}"
                                             update="messages" process="lightWidth lightHeight @this"
                                             style="margin-right:5px;"/>
                            <p:commandButton value="#{i18n.t('Logo entfernen')}" icon="pi pi-trash"
                                             styleClass="ui-button-danger"
                                             actionListener="#{brandingBackingBean.deleteLightLogo()}"
                                             update="messages fm"
                                             process="@this">
                                <p:confirm header="#{i18n.t('Bestätigung')}" message="Light-Logo wirklich löschen?"
                                           icon="pi pi-exclamation-triangle"/>
                            </p:commandButton>
                        </h:panelGroup>
                    </div>

                    <div class="col-12 md:col-6">
                        <h:panelGroup id="lightPreviewPanel">
                            <h:panelGroup rendered="#{brandingBackingBean.hasLightLogo}">
                                <p style="font-weight:bold; margin-bottom:5px;">#{i18n.t('Vorschau')}:</p>
                                <div style="background:#f8f9fa; padding:15px; border-radius:8px; display:inline-block;">
                                    <img src="#{brandingBackingBean.lightLogoPreview}"
                                         width="#{brandingBackingBean.lightLogoWidth}"
                                         height="#{brandingBackingBean.lightLogoHeight}"
                                         alt="Light Logo Preview"
                                         style="max-width:100%; object-fit:contain;"/>
                                </div>
                            </h:panelGroup>
                            <h:panelGroup rendered="#{!brandingBackingBean.hasLightLogo}">
                                <p style="color:var(--text-color-secondary); font-style:italic;">
                                    #{i18n.t('Kein Light-Logo hochgeladen')}
                                </p>
                            </h:panelGroup>
                        </h:panelGroup>
                    </div>
                </div>
            </p:fieldset>

            <!-- Logo Dark -->
            <p:fieldset legend="#{i18n.t('Logo (Dark Mode)')}" toggleable="true" style="margin-bottom: 1rem;">
                <div class="grid">
                    <div class="col-12 md:col-6">
                        <h:panelGrid columns="2" cellpadding="5" style="width:100%;">
                            <h:outputText value="#{i18n.t('Breite')} (px):" style="font-weight:bold;"/>
                            <p:inputNumber id="darkWidth" value="#{brandingBackingBean.darkLogoWidth}"
                                           minValue="20" maxValue="500" decimalPlaces="0" style="width:120px;"/>

                            <h:outputText value="#{i18n.t('Höhe')} (px):" style="font-weight:bold;"/>
                            <p:inputNumber id="darkHeight" value="#{brandingBackingBean.darkLogoHeight}"
                                           minValue="10" maxValue="200" decimalPlaces="0" style="width:120px;"/>
                        </h:panelGrid>

                        <div style="margin-top:10px;">
                            <p:fileUpload listener="#{brandingBackingBean.handleDarkLogoUpload}"
                                          mode="advanced" auto="true" allowTypes="/(\.|\/)(png|svg|webp|jpe?g)$/i"
                                          maxFileSize="2097152" fileLimit="1"
                                          update="messages darkPreviewPanel"
                                          label="Dark-Logo hochladen" uploadLabel="Upload"
                                          cancelLabel="Abbrechen"
                                          style="margin-bottom:10px;"/>
                        </div>

                        <h:panelGroup rendered="#{brandingBackingBean.hasDarkLogo}">
                            <p:commandButton value="#{i18n.t('Dimensionen speichern')}" icon="pi pi-save"
                                             actionListener="#{brandingBackingBean.saveDarkLogoDimensions()}"
                                             update="messages" process="darkWidth darkHeight @this"
                                             style="margin-right:5px;"/>
                            <p:commandButton value="#{i18n.t('Logo entfernen')}" icon="pi pi-trash"
                                             styleClass="ui-button-danger"
                                             actionListener="#{brandingBackingBean.deleteDarkLogo()}"
                                             update="messages fm"
                                             process="@this">
                                <p:confirm header="#{i18n.t('Bestätigung')}" message="Dark-Logo wirklich löschen?"
                                           icon="pi pi-exclamation-triangle"/>
                            </p:commandButton>
                        </h:panelGroup>
                    </div>

                    <div class="col-12 md:col-6">
                        <h:panelGroup id="darkPreviewPanel">
                            <h:panelGroup rendered="#{brandingBackingBean.hasDarkLogo}">
                                <p style="font-weight:bold; margin-bottom:5px;">#{i18n.t('Vorschau')}:</p>
                                <div style="background:#1e1e2f; padding:15px; border-radius:8px; display:inline-block;">
                                    <img src="#{brandingBackingBean.darkLogoPreview}"
                                         width="#{brandingBackingBean.darkLogoWidth}"
                                         height="#{brandingBackingBean.darkLogoHeight}"
                                         alt="Dark Logo Preview"
                                         style="max-width:100%; object-fit:contain;"/>
                                </div>
                            </h:panelGroup>
                            <h:panelGroup rendered="#{!brandingBackingBean.hasDarkLogo}">
                                <p style="color:var(--text-color-secondary); font-style:italic;">
                                    #{i18n.t('Kein Dark-Logo hochgeladen')}
                                </p>
                            </h:panelGroup>
                        </h:panelGroup>
                    </div>
                </div>
            </p:fieldset>

            <!-- Language Switcher Settings -->
            <p:fieldset legend="#{i18n.t('Sprachwechsel (Topbar)')}" toggleable="true" style="margin-bottom: 1rem;">
                <div class="grid">
                    <div class="col-12 md:col-8">
                        <h:panelGrid columns="2" cellpadding="5" style="width:100%;">
                            <h:outputText value="#{i18n.t('Sprachwechsel anzeigen')}:" style="font-weight:bold;"/>
                            <p:toggleSwitch id="i18nEnabled" value="#{brandingBackingBean.i18nEnabled}"/>

                            <h:outputText value="#{i18n.t('Icon')}:" style="font-weight:bold;"/>
                            <h:panelGroup>
                                <p:selectOneMenu id="i18nIcon" value="#{brandingBackingBean.i18nIcon}" style="width:280px;">
                                    <f:selectItem itemLabel="Globe (pi-globe)" itemValue="pi pi-globe"/>
                                    <f:selectItem itemLabel="Language (pi-language)" itemValue="pi pi-language"/>
                                    <f:selectItem itemLabel="Flag (pi-flag)" itemValue="pi pi-flag"/>
                                    <f:selectItem itemLabel="Comments (pi-comments)" itemValue="pi pi-comments"/>
                                    <f:selectItem itemLabel="Bookmark (pi-bookmark)" itemValue="pi pi-bookmark"/>
                                    <p:ajax update="i18nIconPreview"/>
                                </p:selectOneMenu>
                            </h:panelGroup>
                        </h:panelGrid>

                        <p:commandButton value="#{i18n.t('Speichern')}" icon="pi pi-save"
                                         actionListener="#{brandingBackingBean.saveI18nSettings()}"
                                         update="messages"
                                         process="i18nEnabled i18nIcon @this"
                                         style="margin-top:10px;"/>
                    </div>

                    <div class="col-12 md:col-4">
                        <p style="font-weight:bold; margin-bottom:5px;">#{i18n.t('Vorschau')}:</p>
                        <h:panelGroup id="i18nIconPreview">
                            <div style="background:var(--surface-50); padding:15px; border-radius:8px; display:inline-flex; align-items:center; gap:10px;">
                                <i class="#{brandingBackingBean.i18nIcon}" style="font-size:1.5rem; color:var(--primary-color);"/>
                                <span style="color:var(--text-color-secondary);">#{i18n.t('Sprache wechseln')}</span>
                            </div>
                        </h:panelGroup>
                    </div>
                </div>
            </p:fieldset>

            <!-- Footer Settings -->
            <p:fieldset legend="#{i18n.t('Footer')}" toggleable="true" style="margin-bottom: 1rem;">
                <div class="grid">
                    <div class="col-12 md:col-8">
                        <h:panelGrid columns="2" cellpadding="5" style="width:100%;">
                            <h:outputText value="#{i18n.t('Footer-Text')}:" style="font-weight:bold;"/>
                            <p:inputText id="footerText" value="#{brandingBackingBean.footerText}"
                                         placeholder="z.B. Copyright © Meine Firma"
                                         style="width:100%;"/>

                            <h:outputText value="#{i18n.t('Version anzeigen')}:" style="font-weight:bold;"/>
                            <p:toggleSwitch id="showVersion" value="#{brandingBackingBean.showVersion}"/>

                            <h:outputText value="#{i18n.t('Root-Version anzeigen')}:" style="font-weight:bold;"/>
                            <p:toggleSwitch id="showRootVersion" value="#{brandingBackingBean.showRootVersion}"/>

                            <h:outputText value="#{i18n.t('Build-Zeitpunkt anzeigen')}:" style="font-weight:bold;"/>
                            <p:toggleSwitch id="showBuildTimestamp" value="#{brandingBackingBean.showBuildTimestamp}"/>
                        </h:panelGrid>

                        <p:commandButton value="#{i18n.t('Footer speichern')}" icon="pi pi-save"
                                         actionListener="#{brandingBackingBean.saveFooterSettings()}"
                                         update="messages"
                                         process="footerText showVersion showRootVersion showBuildTimestamp @this"
                                         style="margin-top:10px;"/>
                    </div>

                    <div class="col-12 md:col-4">
                        <p style="font-weight:bold; margin-bottom:5px;">#{i18n.t('Vorschau')}:</p>
                        <div style="background:var(--surface-50); padding:10px; border-radius:8px; font-size:0.8rem; color:var(--text-color-secondary);">
                            <h:outputText value="#{brandingBackingBean.footerText}"
                                          rendered="#{not empty brandingBackingBean.footerText}"/>
                            <h:outputText value="Copyright &#169; Plaintext.ch"
                                          rendered="#{empty brandingBackingBean.footerText}"/>
                            <h:outputText value=" | Version #{versionBean.version}"
                                          rendered="#{brandingBackingBean.showVersion}"/>
                            <h:outputText value=" | Root #{versionBean.rootVersion}"
                                          rendered="#{brandingBackingBean.showRootVersion}"/>
                            <h:outputText value=" | #{versionBean.buildTimestamp}"
                                          rendered="#{brandingBackingBean.showBuildTimestamp}"/>
                        </div>
                    </div>
                </div>
            </p:fieldset>

            <p:confirmDialog global="true" showEffect="fade" hideEffect="fade">
                <p:commandButton value="#{i18n.t('Ja')}" type="button" styleClass="ui-confirmdialog-yes"/>
                <p:commandButton value="#{i18n.t('Nein')}" type="button" styleClass="ui-confirmdialog-no"/>
            </p:confirmDialog>
        </h:form>
    </ui:define>
</ui:composition>
