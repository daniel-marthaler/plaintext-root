worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 12M;

    map $http_x_forwarded_proto $the_x_forwarded_proto {
        ""      $scheme;
        default $http_x_forwarded_proto;
    }

    map $http_x_forwarded_proto $proto_default_port {
        "https"  "443";
        "http"   "80";
        default  $server_port;
    }

    map $http_x_forwarded_port $the_x_forwarded_port {
        ""      $proto_default_port;
        default $http_x_forwarded_port;
    }

    include /etc/nginx/conf.d/*.conf;

    # ── DEV environment (port 1123) ──────────────────────────
    server {
        listen 1123;
        server_name _;

        location / {
            proxy_pass http://root_int_backend;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $the_x_forwarded_proto;
            proxy_set_header X-Forwarded-Port $the_x_forwarded_port;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }
    }
}
