services:

  # ── Nginx Reverse Proxy (Blue-Green Router) ──────────────
  nginx-proxy:
    container_name: plaintext-root-nginx
    image: nginx:1.27-alpine
    restart: always
    ports:
      - published: 1123
        target: 1123
        protocol: tcp
        mode: host
    volumes:
      - /volume1/docker/plaintext-root/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /volume1/docker/plaintext-root/nginx/conf.d:/etc/nginx/conf.d:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 32M
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:1123/nosec/version || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      int-blue:
        condition: service_started
      int-green:
        condition: service_started

  # ── DEV Blue ─────────────────────────────────────────────
  int-blue:
    container_name: plaintext-root-int-blue
    image: plaintext-root:latest
    restart: always
    expose:
      - "8080"
    volumes:
      - /volume1/docker/plaintext-root/plaintext-root-int-blue/logs:/app/logs
    environment:
      JAVA_OPTS: "-Xmx1g -Xms512m"
      SPRING_PROFILES_ACTIVE: "prod,postgres"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://plaintext-root-db-int:5432/plaintext_root"
      SPRING_DATASOURCE_USERNAME: "plaintext"
      SPRING_DATASOURCE_PASSWORD: "plaintext"
      LOGGING_LEVEL_ROOT: "INFO"
      LOGGING_LEVEL_CH_PLAINTEXT: "INFO"
      MAD_AUTOLOGIN: "true"
      MAD_ROLLENZUWEISUNGSTOKEN: "true"
      PLAINTEXT_APP_NAME: "Plaintext Root DEV"
      PLAINTEXT_ENV: "int"
      PLAINTEXT_APP_URL: "http://192.168.1.224:1123"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2048M
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - default
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      plaintext-root-db-int:
        condition: service_healthy

  # ── DEV Green ────────────────────────────────────────────
  int-green:
    container_name: plaintext-root-int-green
    image: plaintext-root:latest
    restart: always
    expose:
      - "8080"
    volumes:
      - /volume1/docker/plaintext-root/plaintext-root-int-green/logs:/app/logs
    environment:
      JAVA_OPTS: "-Xmx1g -Xms512m"
      SPRING_PROFILES_ACTIVE: "prod,postgres"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://plaintext-root-db-int:5432/plaintext_root"
      SPRING_DATASOURCE_USERNAME: "plaintext"
      SPRING_DATASOURCE_PASSWORD: "plaintext"
      LOGGING_LEVEL_ROOT: "INFO"
      LOGGING_LEVEL_CH_PLAINTEXT: "INFO"
      MAD_AUTOLOGIN: "true"
      MAD_ROLLENZUWEISUNGSTOKEN: "true"
      PLAINTEXT_APP_NAME: "Plaintext Root DEV"
      PLAINTEXT_ENV: "int"
      PLAINTEXT_APP_URL: "http://192.168.1.224:1123"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2048M
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - default
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      plaintext-root-db-int:
        condition: service_healthy

  # ── DEV Database ─────────────────────────────────────────
  plaintext-root-db-int:
    container_name: plaintext-root-db-int
    image: postgres:18.3-alpine
    restart: always
    volumes:
      - /volume1/docker/plaintext-root/plaintext-root-db-int:/var/lib/postgresql
    environment:
      POSTGRES_DB: "plaintext_root"
      POSTGRES_USER: "plaintext"
      POSTGRES_PASSWORD: "plaintext"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 128M
    networks:
      - default
    ports:
      - published: 15443
        target: 5432
        protocol: tcp
        mode: host
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plaintext -d plaintext_root"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  default:
    driver: bridge
