<ui:composition xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:c="http://xmlns.jcp.org/jsp/jstl/core"
                xmlns="http://www.w3.org/1999/xhtml"
                template="/includes/template.xhtml">

    <ui:define name="title">#{i18n.t('Datenverwaltung')} (Admin)</ui:define>

    <ui:define name="page">
        <f:metadata>
            <f:event type="preRenderView" listener="#{adminEntityBackingBean.initThis()}"/>
        </f:metadata>

        <style>
            /* Defining column widths */
            .label-column {
                width: 30%;
            }

            .input-column {
                width: 70%;
            }

            /* Add spacing between rows in dialog */
            .dialog-grid td {
                padding: 8px 4px;
            }

            .action-buttons {
                margin-bottom: 15px;
                padding: 10px;
                background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
                border-radius: 8px;
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
                gap: 10px;
                align-items: center;
            }

            .entity-selector {
                margin-bottom: 20px;
            }

            /* Mobile optimizations */
            @media screen and (max-width: 768px) {
                .action-buttons {
                    grid-template-columns: 1fr;
                }

                .action-buttons .ui-button {
                    width: 100% !important;
                }
            }

            /* Dark mode support */
            @media (prefers-color-scheme: dark) {
                .action-buttons {
                    background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
                }
            }
        </style>

        <h:outputScript>
            history.pushState(null, null, '/adminentities.html');
        </h:outputScript>

        <p:growl id="messages" showDetail="true" life="3000"/>

        <p:confirmDialog global="true" showEffect="fade" hideEffect="fade">
            <h:form>
                <p:commandButton value="Ja" type="button" styleClass="ui-confirmdialog-yes"/>
                <p:commandButton value="Nein" type="button" styleClass="ui-confirmdialog-no"/>
            </h:form>
        </p:confirmDialog>

        <!-- Entity Type Selector -->
        <div class="entity-selector">
            <h:form id="selectorForm">
                <input type="hidden" name="_csrf" value="#{_csrf.token}"/>
                <p:panel header="#{i18n.t('Entitätstyp auswählen')}">
                    <div class="p-fluid">
                        <p:selectOneMenu value="#{adminEntityBackingBean.selectedEntityType}"
                                         converter="entityDescriptorConverter"
                                         valueChangeListener="#{adminEntityBackingBean.onEntityTypeSelected}"
                                         onchange="submit()">
                            <f:attribute name="backingBean" value="#{adminEntityBackingBean}"/>
                            <f:selectItem itemLabel="-- Bitte wählen --" itemValue="#{null}" noSelectionOption="true"/>
                            <f:selectItems value="#{adminEntityBackingBean.availableEntities}"
                                           var="entity"
                                           itemLabel="#{entity.displayName}"
                                           itemValue="#{entity}"/>
                        </p:selectOneMenu>
                    </div>
                </p:panel>
            </h:form>
        </div>

        <!-- Entity List -->
        <h:form id="listForm">
            <input type="hidden" name="_csrf" value="#{_csrf.token}"/>
            <p:panel header="#{adminEntityBackingBean.selectedEntityType != null ? adminEntityBackingBean.selectedEntityType.displayName : 'Keine Entität ausgewählt'}"
                     rendered="#{adminEntityBackingBean.selectedEntityType != null}">

                <h:panelGroup id="actionButtons" layout="block" styleClass="action-buttons">
                    <p:commandButton value="Neu"
                                     icon="pi pi-plus"
                                     action="#{adminEntityBackingBean.newEntity()}"
                                     update="@(#editForm)"
                                     oncomplete="PF('editDialog').show()"
                                     process="@this"/>
                    <p:commandButton value="Bearbeiten"
                                     icon="pi pi-pencil"
                                     action="#{adminEntityBackingBean.selectEntity()}"
                                     update="@(#editForm)"
                                     oncomplete="PF('editDialog').show()"
                                     process="@this"
                                     disabled="#{adminEntityBackingBean.selectedEntity == null}"/>
                    <p:commandButton value="Löschen"
                                     icon="pi pi-trash"
                                     styleClass="ui-button-danger"
                                     action="#{adminEntityBackingBean.deleteEntity()}"
                                     update="messages,entityTable,actionButtons"
                                     process="@this"
                                     disabled="#{adminEntityBackingBean.selectedEntity == null}">
                        <p:confirm header="Bestätigung"
                                   message="Möchten Sie diesen Eintrag wirklich löschen?"
                                   icon="pi pi-exclamation-triangle"/>
                    </p:commandButton>
                    <p:commandButton value="Aktualisieren"
                                     icon="pi pi-refresh"
                                     action="#{adminEntityBackingBean.loadEntities()}"
                                     update="entityTable,actionButtons"
                                     process="@this"/>
                </h:panelGroup>

                <p:dataTable id="entityTable"
                             value="#{adminEntityBackingBean.entities}"
                             var="entity"
                             selectionMode="single"
                             selection="#{adminEntityBackingBean.selectedEntity}"
                             rowKey="#{adminEntityBackingBean.getEntityId(entity)}"
                             paginator="true"
                             rows="20"
                             paginatorPosition="bottom"
                             emptyMessage="#{i18n.t('Keine Daten gefunden')}"
                             reflow="true">

                    <p:ajax event="rowSelect" update="@form"/>
                    <p:ajax event="rowUnselect" update="@form"/>

                    <p:columns value="#{adminEntityBackingBean.displayFields}"
                               var="field"
                               headerText="#{field.displayName}"
                               sortBy="#{adminEntityBackingBean.getFieldValue(entity, field)}"
                               priority="1">
                        <h:outputText value="#{adminEntityBackingBean.getFieldValue(entity, field)}"/>
                    </p:columns>
                </p:dataTable>
            </p:panel>
        </h:form>

        <!-- Edit Dialog -->
        <h:form id="editForm">
            <input type="hidden" name="_csrf" value="#{_csrf.token}"/>
            <p:dialog id="editDialog"
                      header="#{adminEntityBackingBean.selectedEntityType != null ? adminEntityBackingBean.selectedEntityType.displayName.concat(' Details') : 'Details'}"
                      widgetVar="editDialog"
                      modal="true"
                      resizable="false"
                      columnClasses="label-column, input-column"
                      showEffect="fade"
                      hideEffect="fade"
                      height="700"
                      dynamic="true">

                <h:panelGrid columns="2" styleClass="dialog-grid">
                    <c:forEach items="#{adminEntityBackingBean.editableFields}" var="field">
                        <h:outputText value="#{field.displayName}:" escape="false"/>

                        <h:panelGroup>
                            <!-- Mandat Dropdown -->
                            <p:selectOneMenu id="mandatDropdown"
                                             value="#{adminEntityBackingBean.fieldValues[field.fieldName]}"
                                             rendered="#{field.fieldName == 'mandat'}"
                                             required="#{field.required}"
                                             style="width: 450px;">
                                <f:selectItem itemLabel="-- Kein Mandat --" itemValue="" noSelectionOption="true"/>
                                <f:selectItems value="#{adminEntityBackingBean.allMandate}"
                                               var="m"
                                               itemLabel="#{m}"
                                               itemValue="#{m}"/>
                            </p:selectOneMenu>

                            <!-- Text input -->
                            <p:inputText id="textInput"
                                         value="#{adminEntityBackingBean.fieldValues[field.fieldName]}"
                                         rendered="#{field.text and not field.lob and field.fieldName != 'mandat'}"
                                         required="#{field.required}"
                                         size="45"/>

                            <!-- Large text area -->
                            <p:inputTextarea id="textareaInput"
                                             value="#{adminEntityBackingBean.fieldValues[field.fieldName]}"
                                             rows="5"
                                             rendered="#{field.lob}"
                                             required="#{field.required}"
                                             style="width: 450px;"/>

                            <!-- Numeric input -->
                            <p:inputNumber id="numberInput"
                                           value="#{adminEntityBackingBean.fieldValues[field.fieldName]}"
                                           decimalPlaces="0"
                                           rendered="#{field.numeric}"
                                           required="#{field.required}"/>

                            <!-- Boolean checkbox -->
                            <p:selectBooleanCheckbox id="checkboxInput"
                                                     value="#{adminEntityBackingBean.fieldValues[field.fieldName]}"
                                                     rendered="#{field.booleanType}"
                                                     required="#{field.required}"/>

                            <!-- Date/Time picker -->
                            <p:datePicker id="dateInput"
                                          value="#{adminEntityBackingBean.fieldValues[field.fieldName]}"
                                          showTime="true"
                                          pattern="dd.MM.yyyy HH:mm"
                                          rendered="#{field.dateTime}"
                                          required="#{field.required}"/>
                        </h:panelGroup>
                    </c:forEach>

                    <br/>
                    <h:panelGroup colspan="3">
                        <p:commandButton value="Speichern"
                                         icon="pi pi-check"
                                         action="#{adminEntityBackingBean.saveEntity()}"
                                         update="@form @(#messages) @(#listForm)"
                                         oncomplete="if (args &amp;&amp; !args.validationFailed) PF('editDialog').hide();"/>
                    </h:panelGroup>
                </h:panelGrid>
            </p:dialog>
        </h:form>
    </ui:define>
</ui:composition>
