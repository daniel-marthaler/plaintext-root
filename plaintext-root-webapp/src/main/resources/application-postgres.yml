# PostgreSQL profile
# Activate with: spring.profiles.active=postgres
# Or: SPRING_PROFILES_ACTIVE=postgres
#
# Requires a running PostgreSQL instance (see compose.yaml)
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:plaintext_root}
    username: ${DB_USER:plaintext}
    password: ${DB_PASSWORD:plaintext}
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  h2:
    console:
      enabled: false
