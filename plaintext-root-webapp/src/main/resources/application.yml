spring:
  application:
    name: plaintext-root
  profiles:
    active: dev
    include: discovery
  config:
    import: "optional:file:./plconfig/spring/application.yml"
  main:
    allow-circular-references: true
    allow-bean-definition-overriding: true
  servlet:
    multipart:
      max-file-size: 10MB
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:plaintext_root}
    username: ${DB_USER:plaintext}
    password: ${DB_PASSWORD:plaintext}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  docker:
    compose:
      enabled: ${DOCKER_COMPOSE_ENABLED:false}
      file: ../compose.yaml
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: true

logging:
  level:
    root: WARN
    ch.plaintext: DEBUG
    org.springframework.security: DEBUG

joinfaces:
  faces-servlet:
    url-mappings:
      - "*.jsf"
      - "*.xhtml"
      - "*.html"
      - "/faces/*"
  primefaces:
    theme: none

mad:
  autologin: true

plaintext:
  stage: ${PLAINTEXT_ENV:dev}
  root:
    version: '@project.version@'
  menu:
    scan-package: ch.plaintext

discovery:
  enabled: true
  app:
    id: ${DISCOVERY_APP_ID:plaintext-root}
    name: ${PLAINTEXT_APP_NAME:Plaintext Root}
    url: ${PLAINTEXT_APP_URL:http://localhost:8080}
  mqtt:
    broker: ${DISCOVERY_MQTT_BROKER:}
    client-id: plaintext-root-discovery
