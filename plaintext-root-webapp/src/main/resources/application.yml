spring:
  application:
    name: plaintext-root
  profiles:
    active: dev
    include: discovery
  config:
    import: "optional:file:./plconfig/spring/application.yml"
  main:
    allow-circular-references: true
    allow-bean-definition-overriding: true
  servlet:
    multipart:
      max-file-size: 10MB
  # Default: H2 in-memory with PostgreSQL compatibility mode
  # Switch to real PostgreSQL: add spring.profiles.active=postgres
  datasource:
    url: jdbc:h2:mem:plaintext_root;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console
  docker:
    compose:
      enabled: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: true

logging:
  level:
    root: WARN
    ch.plaintext: DEBUG

joinfaces:
  faces-servlet:
    url-mappings:
      - "*.jsf"
      - "*.xhtml"
      - "*.html"
      - "/faces/*"
  primefaces:
    theme: none

mad:
  autologin: true

plaintext:
  stage: ${PLAINTEXT_ENV:dev}
  root:
    version: '@project.version@'
  menu:
    scan-package: ch.plaintext

# Discovery: works without MQTT broker (shows only own instance)
# To connect multiple apps, configure a MQTT broker
discovery:
  enabled: true
  app:
    id: ${DISCOVERY_APP_ID:plaintext-root}
    name: ${PLAINTEXT_APP_NAME:Plaintext Root}
    url: ${PLAINTEXT_APP_URL:http://localhost:8080}
  mqtt:
    broker: ${DISCOVERY_MQTT_BROKER:}
    client-id: plaintext-root-discovery
