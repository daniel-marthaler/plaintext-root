# ═══════════════════════════════════════════════════════════════
#  plaintext-build.cfg - Plaintext Root Build Configuration
#
#  Used by plaintext-scripts build system.
#  Not checked in - override via PLAINTEXT_BUILD_CONFIG env in CI.
#
#  Priority: individual ENV > PLAINTEXT_BUILD_CONFIG env > this file
# ═══════════════════════════════════════════════════════════════

# ── Project ──────────────────────────────────────────────────
IMAGE_NAME=plaintext-root
WEBAPP_MODULE=plaintext-root-webapp
TUI_TITLE=PLAINTEXT ROOT BUILD SYSTEM

# ── Deployment ───────────────────────────────────────────────
DEPLOY_PATH=/volume1/docker/plaintext-root
DEPLOY_USER=mad
#NAS_HOST=192.168.1.224
#REGISTRY_PORT=6666
#NAS_REMOTE_TEMP=/volume1/docker/temp
#COMPOSE_FILE=docker-compose.yaml

# ── Database ─────────────────────────────────────────────────
DB_NAME=plaintext_root
DB_CONTAINER_PREFIX=plaintext-root

# ── Ports ────────────────────────────────────────────────────
DEV_PORT=1123
PROD_PORT=0

# ── Maven ────────────────────────────────────────────────────
MVN_RELEASE_DEPLOY=true
