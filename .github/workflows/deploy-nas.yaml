name: Release & Deploy to NAS

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      build-command:
        description: 'Build command (5=DEV, 6=PROD, 56=DEV+PROD)'
        required: false
        type: choice
        options:
          - '56'
          - '5'
          - '6'
        default: '56'

concurrency:
  group: plaintext-root-deploy
  cancel-in-progress: false

jobs:
  deploy:
    # Runs on: manual trigger (workflow_dispatch) OR push with [release] in commit message
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[release]')
    uses: daniel-marthaler/plaintext-scripts/.github/workflows/maven-build-deploy.yaml@master
    with:
      build-command: ${{ github.event.inputs.build-command || '56' }}
      build-config: |
        IMAGE_NAME=plaintext-root
        WEBAPP_MODULE=plaintext-root-webapp
        TUI_TITLE=PLAINTEXT ROOT BUILD SYSTEM
        DEPLOY_PATH=/volume1/docker/plaintext-root
        DEPLOY_USER=mad
        DB_NAME=plaintext_root
        DB_CONTAINER_PREFIX=plaintext-root
        DEV_PORT=1123
        PROD_PORT=0
        MVN_RELEASE_DEPLOY=true
    secrets:
      TWINGATE_SERVICE_KEY: ${{ secrets.TWINGATE_SERVICE_KEY }}
      MVN_DEPLOY_TOKEN: ${{ secrets.MVN_DEPLOY_TOKEN }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
