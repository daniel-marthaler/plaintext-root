name: Release & Deploy

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Build command (1=Snapshot, 3=Release only, 5=Release+Deploy INT)'
        required: true
        default: '5'
        type: choice
        options:
          - '1'
          - '3'
          - '5'

concurrency:
  group: release-deploy
  cancel-in-progress: false

jobs:
  release-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: plaintext_root
          POSTGRES_USER: plaintext
          POSTGRES_PASSWORD: plaintext
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U plaintext -d plaintext_root"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up SSH for NAS deployment
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 192.100.0.1 >> ~/.ssh/known_hosts 2>/dev/null || true
          # Configure SSH to skip host key checking for NAS
          cat >> ~/.ssh/config << 'SSHEOF'
          Host 192.100.0.1
            User mad
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking no
          SSHEOF
          chmod 600 ~/.ssh/config

      - name: Start Twingate
        if: ${{ secrets.TWINGATE_SERVICE_KEY != '' }}
        uses: twingate/github-action@v1
        with:
          service-key: ${{ secrets.TWINGATE_SERVICE_KEY }}

      - name: Clone plaintext-scripts
        run: |
          git clone https://github.com/daniel-marthaler/plaintext-scripts.git ~/.plaintext-scripts || \
          git clone git@github.com:daniel-marthaler/plaintext-scripts.git ~/.plaintext-scripts

      - name: Configure Maven for GitHub Packages
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'MVNEOF'
          <settings>
            <servers>
              <server>
                <id>plaintext</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          MVNEOF

      - name: Run build command
        run: |
          echo "Running: ./build ${{ github.event.inputs.command }}"
          chmod +x ./build
          ./build ${{ github.event.inputs.command }}
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5434/plaintext_root
          SPRING_DATASOURCE_USERNAME: plaintext
          SPRING_DATASOURCE_PASSWORD: plaintext
          CI: true

      - name: Show versions after build
        if: always()
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Command:** \`./build ${{ github.event.inputs.command }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** $(cat version.txt 2>/dev/null || echo 'n/a')" >> $GITHUB_STEP_SUMMARY
          echo "- **Release:** $(cat versionRelease.txt 2>/dev/null || echo 'n/a')" >> $GITHUB_STEP_SUMMARY
