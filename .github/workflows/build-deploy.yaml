name: Build, Test & Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: plaintext-root-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: ${{ !contains(github.event.head_commit.message, '[skip-ci]') }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: plaintext_root
          POSTGRES_USER: plaintext
          POSTGRES_PASSWORD: plaintext
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U plaintext -d plaintext_root"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
          server-id: plaintext
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Build & Test with Coverage
        run: mvn clean install -B
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5434/plaintext_root
          SPRING_DATASOURCE_USERNAME: plaintext
          SPRING_DATASOURCE_PASSWORD: plaintext

      - name: Deploy to GitHub Packages
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: mvn deploy -B -DskipTests -DaltDeploymentRepository=plaintext::https://maven.pkg.github.com/daniel-marthaler/plaintext-mvn
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate JaCoCo aggregate report
        run: mvn jacoco:report -B
        if: always()

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: '**/target/surefire-reports/*.xml'
          retention-days: 7

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: '**/target/site/jacoco/'
          retention-days: 14

      - name: JaCoCo Coverage Summary
        if: always()
        run: |
          echo "## Code Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Module | Instructions | Branches |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------------|----------|" >> $GITHUB_STEP_SUMMARY
          for report in $(find . -path "*/target/site/jacoco/jacoco.csv" 2>/dev/null); do
            module=$(echo "$report" | sed 's|./\(.*\)/target/.*|\1|')
            if [ -f "$report" ]; then
              missed=$(tail -n +2 "$report" | awk -F',' '{sum+=$4} END {print sum+0}')
              covered=$(tail -n +2 "$report" | awk -F',' '{sum+=$5} END {print sum+0}')
              total=$((missed + covered))
              if [ "$total" -gt 0 ]; then
                pct=$((covered * 100 / total))
                echo "| $module | ${pct}% (${covered}/${total}) | - |" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          done
