name: Build & Deploy

on:
  push:
    branches: [master]

concurrency:
  group: plaintext-root-build
  cancel-in-progress: false

jobs:
  build:
    if: ${{ !contains(github.event.head_commit.message, '[skip-ci]') }}
    uses: daniel-marthaler/plaintext-scripts/.github/workflows/maven-build-deploy.yaml@master
    with:
      build-command: "5"
    secrets: inherit
